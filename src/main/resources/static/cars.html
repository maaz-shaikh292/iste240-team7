<!DOCTYPE html>
<html>
<head>
    <title>Cars Page</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h1>Car Rentals</h1>
<a href="index.html">Back to Home</a>
<hr>

<!-- buttons -->
<button id="showAddBtn">Add New Car</button>

<br><br>

<!-- search -->
<input type="text" id="searchInput" placeholder="Search by brand...">
<button id="searchBtn">Search</button>
<button id="clearBtn">Clear</button>

<br><br>

<!-- add/edit form, hidden at start -->
<div id="carForm" style="display:none; background:#f0f0f0; padding:15px;">
    <h3 id="formTitle">Add Car</h3>
    <input type="hidden" id="carId">
    Brand: <input type="text" id="carBrand" placeholder="brand"><br><br>
    Model: <input type="text" id="carModel" placeholder="model"><br><br>
    Price: <input type="number" id="carPrice" placeholder="price per day"><br><br>
    <button id="saveBtn">Save</button>
    <button id="cancelBtn">Cancel</button>
</div>

<br>

<!-- update price form, hidden at start -->
<div id="priceForm" style="display:none; background:#f0f0f0; padding:15px;">
    <h3>Update Price</h3>
    <input type="hidden" id="priceCarId">
    New Price: <input type="number" id="newPrice" placeholder="new price"><br><br>
    <button id="updatePriceBtn">Update</button>
    <button id="cancelPriceBtn">Cancel</button>
</div>

<!-- table goes here -->
<div id="result"></div>

<script>

    function loadCars() {
        var url = "/api/cars";
        $.get(url, function(data) {

            var table = "<table>";
            table += "<tr><th>ID</th><th>Brand</th><th>Model</th><th>Price</th><th>Actions</th></tr>";

            for (var i = 0; i < data.length; i++) {
                var car = data[i];
                table += "<tr>";
                table += "<td>" + car.id + "</td>";
                table += "<td>" + car.brand + "</td>";
                table += "<td>" + car.model + "</td>";
                table += "<td>" + car.price + "</td>";
                table += "<td>";
                table += "<button class='editBtn' data-id='" + car.id + "' data-brand='" + car.brand + "' data-model='" + car.model + "' data-price='" + car.price + "'>Edit</button> ";
                table += "<button class='priceBtn' data-id='" + car.id + "'>Update Price</button> ";
                table += "<button class='deleteBtn' data-id='" + car.id + "'>Delete</button>";
                table += "</td>";
                table += "</tr>";
            }

            table += "</table>";
            $("#result").html(table);

            // when edit is clicked
            $(".editBtn").click(function() {
                var id = $(this).data("id");
                var brand = $(this).data("brand");
                var model = $(this).data("model");
                var price = $(this).data("price");

                $("#formTitle").text("Edit Car");
                $("#carId").val(id);
                $("#carBrand").val(brand);
                $("#carModel").val(model);
                $("#carPrice").val(price);
                $("#carForm").show();
            });

            // when update price is clicked
            $(".priceBtn").click(function() {
                var id = $(this).data("id");
                $("#priceCarId").val(id);
                $("#newPrice").val("");
                $("#priceForm").show();
            });

            // when delete is clicked
            $(".deleteBtn").click(function() {
                var id = $(this).data("id");
                if (confirm("are you sure you want to delete this car?")) {
                    $.ajax({
                        url: "/api/cars/" + id,
                        method: "DELETE",
                        success: function() {
                            alert("car deleted!");
                            loadCars();
                        },
                        error: function() {
                            alert("something went wrong");
                        }
                    });
                }
            });

        }).fail(function() {
            $("#result").html("<p style='color:red'>sorry cannot load cars from api</p>");
        });
    }

    // search button
    $("#searchBtn").click(function() {
        var keyword = $("#searchInput").val();
        if (keyword == "") {
            loadCars();
            return;
        }
        $.get("/api/cars/search?keyword=" + keyword, function(data) {
            var table = "<table>";
            table += "<tr><th>ID</th><th>Brand</th><th>Model</th><th>Price</th><th>Actions</th></tr>";
            for (var i = 0; i < data.length; i++) {
                var car = data[i];
                table += "<tr>";
                table += "<td>" + car.id + "</td>";
                table += "<td>" + car.brand + "</td>";
                table += "<td>" + car.model + "</td>";
                table += "<td>" + car.price + "</td>";
                table += "<td><button class='deleteBtn' data-id='" + car.id + "'>Delete</button></td>";
                table += "</tr>";
            }
            table += "</table>";
            $("#result").html(table);

            $(".deleteBtn").click(function() {
                var id = $(this).data("id");
                if (confirm("delete this car?")) {
                    $.ajax({
                        url: "/api/cars/" + id,
                        method: "DELETE",
                        success: function() { loadCars(); },
                        error: function() { alert("error deleting car"); }
                    });
                }
            });

        }).fail(function() {
            $("#result").html("<p style='color:red'>search failed</p>");
        });
    });

    // clear search
    $("#clearBtn").click(function() {
        $("#searchInput").val("");
        loadCars();
    });

    // show add form
    $("#showAddBtn").click(function() {
        $("#formTitle").text("Add Car");
        $("#carId").val("");
        $("#carBrand").val("");
        $("#carModel").val("");
        $("#carPrice").val("");
        $("#carForm").show();
    });

    // cancel button
    $("#cancelBtn").click(function() {
        $("#carForm").hide();
    });

    // cancel price button
    $("#cancelPriceBtn").click(function() {
        $("#priceForm").hide();
    });

    // save car
    $("#saveBtn").click(function() {
        var id = $("#carId").val();
        var brand = $("#carBrand").val();
        var model = $("#carModel").val();
        var price = parseInt($("#carPrice").val());

        var carData = {
            brand: brand,
            model: model,
            price: price
        };

        if (id == "") {
            // add new car
            $.ajax({
                url: "/api/cars",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(carData),
                success: function() {
                    alert("car added!");
                    $("#carForm").hide();
                    loadCars();
                },
                error: function() {
                    alert("could not add car");
                }
            });
        } else {
            // edit existing car
            $.ajax({
                url: "/api/cars/" + id,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify(carData),
                success: function() {
                    alert("car updated!");
                    $("#carForm").hide();
                    loadCars();
                },
                error: function() {
                    alert("could not update car");
                }
            });
        }
    });

    // update price
    $("#updatePriceBtn").click(function() {
        var id = $("#priceCarId").val();
        var price = $("#newPrice").val();
        $.ajax({
            url: "/api/cars/" + id + "/price?price=" + price,
            method: "PUT",
            success: function() {
                alert("price updated!");
                $("#priceForm").hide();
                loadCars();
            },
            error: function() {
                alert("could not update price");
            }
        });
    });

    // load cars automatically when page opens
    loadCars();

</script>
</body>
</html>
