<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body class="container mt-4">

<h1>Booking Management</h1>

<input type="text" id="searchInput" placeholder="Search by customer username">
<button id="searchBtn">Search</button>
<button id="clearBtn">Clear</button>
<br><br>

<button id="addBtn">+ Add Booking</button>

<div id="formDiv" style="display:none; margin-top:10px;">
    <input type="hidden" id="bookingId">
    <input type="text" id="startDate" placeholder="Start Date (YYYY-MM-DD)"><br><br>
    <input type="text" id="endDate" placeholder="End Date (YYYY-MM-DD)"><br><br>
    <input type="number" id="totalCost" placeholder="Total Cost"><br><br>
    <select id="confirmed">
        <option value="false">Not Confirmed</option>
        <option value="true">Confirmed</option>
    </select><br><br>
    <input type="number" id="customerId" placeholder="Customer ID"><br><br>
    <button id="saveBtn">Save</button>
    <button id="cancelBtn">Cancel</button>
</div>

<div id="result"></div>

<script>
    loadBookings();

    function loadBookings() {
        $.get('/api/bookings', function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p style='color:red;'>Cannot fetch bookings.</p>");
        });
    }

    function renderTable(data) {
        var htmlTable = "<table>";
        htmlTable += "<tr>";
        htmlTable += "<th>ID</th>";
        htmlTable += "<th>Start Date</th>";
        htmlTable += "<th>End Date</th>";
        htmlTable += "<th>Total Cost</th>";
        htmlTable += "<th>Confirmed</th>";
        htmlTable += "<th>Customer</th>";
        htmlTable += "<th>Actions</th>";
        htmlTable += "</tr>";

        for (var i = 0; i < data.length; i++) {
            var b = data[i];
            var customerUsername = b.linkedCustomer ? b.linkedCustomer.username : 'N/A';
            var customerId = b.linkedCustomer ? b.linkedCustomer.id : '';
            htmlTable += "<tr>";
            htmlTable += "<td>" + b.id + "</td>";
            htmlTable += "<td>" + b.startDate + "</td>";
            htmlTable += "<td>" + b.endDate + "</td>";
            htmlTable += "<td>" + b.totalCost + "</td>";
            htmlTable += "<td>" + b.confirmed + "</td>";
            htmlTable += "<td>" + customerUsername + "</td>";
            htmlTable += "<td>";
            htmlTable += "<button onclick='editBooking(" + b.id + ", \"" + b.startDate + "\", \"" + b.endDate + "\", " + b.totalCost + ", " + b.confirmed + ", " + customerId + ")'>Edit</button> ";
            htmlTable += "<button onclick='deleteBooking(" + b.id + ")'>Delete</button>";
            htmlTable += "</td>";
            htmlTable += "</tr>";
        }

        htmlTable += "</table>";
        $("#result").html(htmlTable);
    }

    $("#searchBtn").click(function() {
        var keyword = $("#searchInput").val();
        $.get('/api/bookings/search?username=' + keyword, function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p style='color:red;'>Cannot search bookings.</p>");
        });
    });

    $("#clearBtn").click(function() {
        $("#searchInput").val('');
        loadBookings();
    });

    $("#addBtn").click(function() {
        $("#bookingId").val('');
        $("#startDate").val('');
        $("#endDate").val('');
        $("#totalCost").val('');
        $("#confirmed").val('false');
        $("#customerId").val('');
        $("#formDiv").show();
    });

    $("#cancelBtn").click(function() {
        $("#formDiv").hide();
    });

    $("#saveBtn").click(function() {
        var id = $("#bookingId").val();
        var booking = {
            startDate: $("#startDate").val(),
            endDate: $("#endDate").val(),
            totalCost: $("#totalCost").val(),
            confirmed: $("#confirmed").val() === 'true',
            linkedCustomer: { id: $("#customerId").val() }
        };

        if (id) {
            $.ajax({
                url: '/api/bookings/' + id,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(booking),
                success: function() {
                    $("#formDiv").hide();
                    loadBookings();
                }
            });
        } else {
            $.ajax({
                url: '/api/bookings',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(booking),
                success: function() {
                    $("#formDiv").hide();
                    loadBookings();
                }
            });
        }
    });

    function editBooking(id, startDate, endDate, totalCost, confirmed, customerId) {
        $("#bookingId").val(id);
        $("#startDate").val(startDate);
        $("#endDate").val(endDate);
        $("#totalCost").val(totalCost);
        $("#confirmed").val(confirmed);
        $("#customerId").val(customerId);
        $("#formDiv").show();
    }

    function deleteBooking(id) {
        if (confirm('Delete this booking?')) {
            $.ajax({
                url: '/api/bookings/' + id,
                type: 'DELETE',
                success: function() {
                    loadBookings();
                }
            });
        }
    }
</script>

</body>
</html>
