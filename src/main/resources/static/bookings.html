<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Bookings</h2>

<!-- Search -->
<input type="text" id="searchInput" class="form-control mb-2" placeholder="Search by customer username...">
<button class="btn btn-primary mb-3" onclick="searchBookings()">Search</button>
<button class="btn btn-secondary mb-3" onclick="loadBookings()">Clear</button>

<!-- Add Button -->
<button class="btn btn-success mb-3" onclick="showForm()">+ Add Booking</button>

<!-- Form -->
<div id="formDiv" style="display:none;" class="mb-3">
    <input type="hidden" id="bookingId">
    <input type="text" id="startDate" class="form-control mb-2" placeholder="Start Date (YYYY-MM-DD)">
    <input type="text" id="endDate" class="form-control mb-2" placeholder="End Date (YYYY-MM-DD)">
    <input type="number" id="totalCost" class="form-control mb-2" placeholder="Total Cost">
    <select id="confirmed" class="form-control mb-2">
        <option value="false">Not Confirmed</option>
        <option value="true">Confirmed</option>
    </select>
    <input type="number" id="customerId" class="form-control mb-2" placeholder="Customer ID">
    <button class="btn btn-success" onclick="saveBooking()">Save</button>
    <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
</div>

<!-- Table -->
<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Total Cost</th>
        <th>Confirmed</th>
        <th>Customer</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
</table>

<script>
    loadBookings();

    function loadBookings() {
        fetch('/api/bookings')
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function searchBookings() {
        const keyword = document.getElementById('searchInput').value;
        fetch('/api/bookings/search?username=' + keyword)
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function renderTable(bookings) {
        const tbody = document.getElementById('bookingTable');
        tbody.innerHTML = '';
        bookings.forEach(b => {
            tbody.innerHTML += `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.startDate}</td>
                        <td>${b.endDate}</td>
                        <td>${b.totalCost}</td>
                        <td>${b.confirmed}</td>
                        <td>${b.linkedCustomer ? b.linkedCustomer.username : 'N/A'}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editBooking(${b.id}, '${b.startDate}', '${b.endDate}', ${b.totalCost}, ${b.confirmed}, ${b.linkedCustomer ? b.linkedCustomer.id : ''})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteBooking(${b.id})">Delete</button>
                        </td>
                    </tr>`;
        });
    }

    function showForm() {
        document.getElementById('bookingId').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('totalCost').value = '';
        document.getElementById('confirmed').value = 'false';
        document.getElementById('customerId').value = '';
        document.getElementById('formDiv').style.display = 'block';
    }

    function editBooking(id, startDate, endDate, totalCost, confirmed, customerId) {
        document.getElementById('bookingId').value = id;
        document.getElementById('startDate').value = startDate;
        document.getElementById('endDate').value = endDate;
        document.getElementById('totalCost').value = totalCost;
        document.getElementById('confirmed').value = confirmed;
        document.getElementById('customerId').value = customerId;
        document.getElementById('formDiv').style.display = 'block';
    }

    function hideForm() {
        document.getElementById('formDiv').style.display = 'none';
    }

    function saveBooking() {
        const id = document.getElementById('bookingId').value;
        const booking = {
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value,
            totalCost: document.getElementById('totalCost').value,
            confirmed: document.getElementById('confirmed').value === 'true',
            linkedCustomer: { id: document.getElementById('customerId').value }
        };

        if (id) {
            fetch('/api/bookings/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(booking)
            }).then(() => { hideForm(); loadBookings(); });
        } else {
            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(booking)
            }).then(() => { hideForm(); loadBookings(); });
        }
    }

    function deleteBooking(id) {
        if (confirm('Delete this booking?')) {
            fetch('/api/bookings/' + id, { method: 'DELETE' })
                .then(() => loadBookings());
        }
    }
</script>

</body>
</html>
