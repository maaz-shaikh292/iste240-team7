<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Customers</h2>

<!-- Search -->
<input type="text" id="searchInput" class="form-control mb-2" placeholder="Search by username...">
<button class="btn btn-primary mb-3" onclick="searchCustomers()">Search</button>
<button class="btn btn-secondary mb-3" onclick="loadCustomers()">Clear</button>

<!-- Add Button -->
<button class="btn btn-success mb-3" onclick="showForm()">+ Add Customer</button>

<!-- Form -->
<div id="formDiv" style="display:none;" class="mb-3">
    <input type="hidden" id="customerId">
    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="text" id="licenseNumber" class="form-control mb-2" placeholder="License Number">
    <button class="btn btn-success" onclick="saveCustomer()">Save</button>
    <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
</div>

<!-- Table -->
<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>License Number</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="customerTable"></tbody>
</table>

<div style=" position: fixed; left: 20px; bottom: 20px;"><a href="index.html"> Home </a></div>


<script>
    loadCustomers();

    function loadCustomers() {
        fetch('/api/customers')
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function searchCustomers() {
        const keyword = document.getElementById('searchInput').value;
        fetch('/api/customers/search?username=' + keyword)
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function renderTable(customers) {
        const tbody = document.getElementById('customerTable');
        tbody.innerHTML = '';
        customers.forEach(c => {
            tbody.innerHTML += `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.username}</td>
                        <td>${c.email}</td>
                        <td>${c.licenseNumber}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editCustomer(${c.id}, '${c.username}', '${c.password}', '${c.email}', '${c.licenseNumber}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">Delete</button>
                        </td>
                    </tr>`;
        });
    }

    function showForm() {
        document.getElementById('customerId').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('email').value = '';
        document.getElementById('licenseNumber').value = '';
        document.getElementById('formDiv').style.display = 'block';
    }

    function editCustomer(id, username, password, email, licenseNumber) {
        document.getElementById('customerId').value = id;
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('email').value = email;
        document.getElementById('licenseNumber').value = licenseNumber;
        document.getElementById('formDiv').style.display = 'block';
    }

    function hideForm() {
        document.getElementById('formDiv').style.display = 'none';
    }

    function saveCustomer() {
        const id = document.getElementById('customerId').value;
        const customer = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            email: document.getElementById('email').value,
            licenseNumber: document.getElementById('licenseNumber').value
        };

        if (id) {
            fetch('/api/customers/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customer)
            }).then(() => { hideForm(); loadCustomers(); });
        } else {
            fetch('/api/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customer)
            }).then(() => { hideForm(); loadCustomers(); });
        }
    }

    function deleteCustomer(id) {
        if (confirm('Delete this customer?')) {
            fetch('/api/customers/' + id, { method: 'DELETE' })
                .then(() => loadCustomers());
        }
    }
</script>

</body>
</html>
