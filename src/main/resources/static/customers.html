<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body class="container mt-4">

<h1>Customer Management</h1>


<input type="text" id="searchInput" placeholder="Search by username">
<button id="searchBtn">Search</button>
<button id="clearBtn">Clear</button>
<br><br>


<button id="addBtn">+ Add Customer</button>


<div id="formDiv" style="display:none; margin-top:10px;">
    <input type="hidden" id="customerId">
    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="text" id="licenseNumber" placeholder="License Number"><br><br>
    <button id="saveBtn">Save</button>
    <button id="cancelBtn">Cancel</button>
</div>


<div id="result"></div>

<script>
    loadCustomers();

    function loadCustomers() {
        $.get('/api/customers', function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p style='color:red;'>Cannot fetch customers.</p>");
        });
    }

    function renderTable(data) {
        var htmlTable = "<table>";
        htmlTable += "<tr>";
        htmlTable += "<th>ID</th>";
        htmlTable += "<th>Username</th>";
        htmlTable += "<th>Email</th>";
        htmlTable += "<th>License Number</th>";
        htmlTable += "<th>Actions</th>";
        htmlTable += "</tr>";

        for (var i = 0; i < data.length; i++) {
            var c = data[i];
            htmlTable += "<tr>";
            htmlTable += "<td>" + c.id + "</td>";
            htmlTable += "<td>" + c.username + "</td>";
            htmlTable += "<td>" + c.email + "</td>";
            htmlTable += "<td>" + c.licenseNumber + "</td>";
            htmlTable += "<td>";
            htmlTable += "<button onclick='editCustomer(" + c.id + ", \"" + c.username + "\", \"" + c.password + "\", \"" + c.email + "\", \"" + c.licenseNumber + "\")'>Edit</button> ";
            htmlTable += "<button onclick='deleteCustomer(" + c.id + ")'>Delete</button>";
            htmlTable += "</td>";
            htmlTable += "</tr>";
        }

        htmlTable += "</table>";
        $("#result").html(htmlTable);
    }

    $("#searchBtn").click(function() {
        var keyword = $("#searchInput").val();
        $.get('/api/customers/search?username=' + keyword, function(data) {
            renderTable(data);
        }).fail(function() {
            $("#result").html("<p style='color:red;'>Cannot search customers.</p>");
        });
    });

    // Clear button click
    $("#clearBtn").click(function() {
        $("#searchInput").val('');
        loadCustomers();
    });

    $("#addBtn").click(function() {
        $("#customerId").val('');
        $("#username").val('');
        $("#password").val('');
        $("#email").val('');
        $("#licenseNumber").val('');
        $("#formDiv").show();
    });

    $("#cancelBtn").click(function() {
        $("#formDiv").hide();
    });

    $("#saveBtn").click(function() {
        var id = $("#customerId").val();
        var customer = {
            username: $("#username").val(),
            password: $("#password").val(),
            email: $("#email").val(),
            licenseNumber: $("#licenseNumber").val()
        };

        if (id) {
            $.ajax({
                url: '/api/customers/' + id,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(customer),
                success: function() {
                    $("#formDiv").hide();
                    loadCustomers();
                }
            });
        } else {
            $.ajax({
                url: '/api/customers',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(customer),
                success: function() {
                    $("#formDiv").hide();
                    loadCustomers();
                }
            });
        }
    });

    function editCustomer(id, username, password, email, licenseNumber) {
        $("#customerId").val(id);
        $("#username").val(username);
        $("#password").val(password);
        $("#email").val(email);
        $("#licenseNumber").val(licenseNumber);
        $("#formDiv").show();
    }

    function deleteCustomer(id) {
        if (confirm('Delete this customer?')) {
            $.ajax({
                url: '/api/customers/' + id,
                type: 'DELETE',
                success: function() {
                    loadCustomers();
                }
            });
        }
    }
</script>

</body>
</html>
